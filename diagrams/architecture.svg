  <text x="460" y="469" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">DC=lab,DC=local</text>

  <!-- OU boxes row -->
  <!-- IT OU -->
  <rect x="60" y="508" width="160" height="100" rx="6" fill="#ffffff" stroke="#1a73e8" stroke-width="1.5"/>
  <rect x="60" y="508" width="160" height="22" rx="6" fill="#1a73e8"/>
  <text x="140" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">OU=IT</text>
  <text x="76" y="546" font-size="9" fill="#333">👤 alice.chen</text>
  <text x="76" y="560" font-size="9" fill="#555">  → IT_Admins</text>
  <text x="76" y="576" font-size="9" fill="#333">📋 GPO: IT Security Policy</text>
  <text x="76" y="590" font-size="9" fill="#888">  Screensaver lock enforced</text>

  <!-- Finance OU -->
  <rect x="248" y="508" width="160" height="100" rx="6" fill="#ffffff" stroke="#fbbc04" stroke-width="1.5"/>
