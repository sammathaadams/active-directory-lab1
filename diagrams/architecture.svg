  <text x="608" y="320" font-size="10" fill="#555">sammathaadams/active-directory-lab1</text>
  <text x="608" y="334" font-size="10" fill="#888">scripts/deploy-ad.ps1 · 144 insertions</text>

  <!-- Arrow: Admin → VM -->
  <line x1="590" y1="238" x2="542" y2="290" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>

