  <rect x="20" y="416" width="880" height="208" rx="10" fill="#e8f5e9" stroke="#34a853" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="36" y="438" font-size="13" font-weight="600" fill="#34a853">🏢  Active Directory — lab.local</text>

