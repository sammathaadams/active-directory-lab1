  <text x="328" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">OU=Finance</text>
  <text x="264" y="546" font-size="9" fill="#333">👤 bob.patel</text>
  <text x="264" y="560" font-size="9" fill="#555">  → Finance_Users</text>

  <!-- HR OU -->
  <rect x="436" y="508" width="160" height="100" rx="6" fill="#ffffff" stroke="#ea4335" stroke-width="1.5"/>
  <rect x="436" y="508" width="160" height="22" rx="6" fill="#ea4335"/>
  <text x="516" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">OU=HR</text>
  <text x="452" y="546" font-size="9" fill="#333">👤 carol.jones</text>
  <text x="452" y="560" font-size="9" fill="#555">  → HR_Users</text>

  <!-- Sales OU -->
  <rect x="624" y="508" width="160" height="100" rx="6" fill="#ffffff" stroke="#ff6d00" stroke-width="1.5"/>
  <rect x="624" y="508" width="160" height="22" rx="6" fill="#ff6d00"/>
  <text x="704" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">OU=Sales</text>
  <text x="640" y="546" font-size="9" fill="#333">👤 david.smith</text>
  <text x="640" y="560" font-size="9" fill="#555">  → Sales_Users</text>

  <!-- Connector lines: domain root → OUs -->
  <line x1="460" y1="482" x2="460" y2="500" stroke="#34a853" stroke-width="1.5"/>
  <line x1="140" y1="500" x2="784" y2="500" stroke="#34a853" stroke-width="1.5"/>
  <line x1="140" y1="500" x2="140" y2="508" stroke="#1a73e8" stroke-width="1.5"/>
  <line x1="328" y1="500" x2="328" y2="508" stroke="#fbbc04" stroke-width="1.5"/>
  <line x1="516" y1="500" x2="516" y2="508" stroke="#ea4335" stroke-width="1.5"/>
  <line x1="704" y1="500" x2="704" y2="508" stroke="#ff6d00" stroke-width="1.5"/>

  <!-- Arrow: VM → AD domain (vertical connector between sections) -->
  <line x1="308" y1="356" x2="460" y2="448" stroke="#34a853" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="348" y="408" font-size="9" fill="#34a853" font-weight="600">Hosts AD DS</text>

  <!-- Defs for arrowheads -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34a853"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9c27b0"/>
    </marker>
  </defs>

</svg>
